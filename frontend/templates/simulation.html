{% extends "base.html" %}

{% block title %}Simulation - AI Life Simulator{% endblock %}

{% block head_extra %}
<style>
    .simulation-layout {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }
    .controls-row {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        justify-content: space-between;
    }
    .left-controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
    }
    .right-controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
    }
</style>
{% endblock %}

{% block content %}
<div class="simulation-layout">
    <!-- Control Panel -->
    <div class="controls-row">
        <div class="left-controls">
            <button id="btn-start" class="btn btn-start">&#9654; Start</button>
            <button id="btn-pause" class="btn btn-pause">&#10074;&#10074; Pause</button>
            <button id="btn-stop" class="btn btn-stop">&#9724; Stop</button>
        </div>
        <div class="right-controls">
            <div class="speed-selector">
                <span style="color: var(--text-secondary); font-size: 0.85rem;">Speed:</span>
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn" data-speed="1">1x</button>
                <button class="speed-btn" data-speed="2">2x</button>
                <button class="speed-btn" data-speed="5">5x</button>
                <button class="speed-btn" data-speed="10">10x</button>
            </div>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container">
        <canvas id="world-canvas"></canvas>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <div class="info-item">
            <div class="label">Status</div>
            <div class="value" id="sim-status">
                <span class="status-badge status-stopped" id="status-text">stopped</span>
            </div>
        </div>
        <div class="info-item">
            <div class="label">Tick</div>
            <div class="value" id="tick-count">0</div>
        </div>
        <div class="info-item">
            <div class="label">Speed</div>
            <div class="value" id="speed-value">1x</div>
        </div>
        <div class="info-item">
            <div class="label">FPS</div>
            <div class="value" id="fps-value">--</div>
        </div>
        <div class="info-item">
            <div class="label">Gen Diversity</div>
            <div class="value" id="gen-diversity">--</div>
        </div>
        <div class="info-item">
            <div class="label">Agents</div>
            <div class="value" id="agent-count">--</div>
        </div>
    </div>

    <!-- Heatmap Toggle -->
    <div class="card">
        <div class="toggle-wrap">
            <input type="checkbox" id="heatmap-toggle">
            <label for="heatmap-toggle">Show Heatmap</label>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/canvas-utils.js"></script>
<script src="/static/js/ws-client.js"></script>
<script src="/static/js/simulation.js"></script>
{% endblock %}
