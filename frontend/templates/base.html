<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Life Simulator{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header>
        <h1>AI Life Simulator</h1>
        <nav>
            <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Home</a>
            <a href="/simulation" {% if request.url.path == '/simulation' %}class="active"{% endif %}>Simulation</a>
            <a href="/agents">Agents</a>
            <a href="/gpu">GPU</a>
            <a href="/analytics">Analytics</a>
            <a href="/stress-test">Stress Test</a>
            <a href="/settings">Settings</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 AI Life Simulator - Roberto Pagano</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
