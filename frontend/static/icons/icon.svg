<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="helixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>

  <!-- Grid symbol -->
  <g stroke="url(#gridGrad)" stroke-width="3" fill="none" opacity="0.5">
    <rect x="120" y="120" width="272" height="272" rx="8"/>
    <line x1="211" y1="120" x2="211" y2="392"/>
    <line x1="301" y1="120" x2="301" y2="392"/>
    <line x1="120" y1="211" x2="392" y2="211"/>
    <line x1="120" y1="301" x2="392" y2="301"/>
  </g>

  <!-- DNA Helix -->
  <g stroke="url(#helixGrad)" stroke-width="6" fill="none" stroke-linecap="round">
    <!-- Left strand -->
    <path d="M180,80 C180,140 332,160 332,220 C332,290 180,320 180,380 C180,440 332,460 332,512"/>
    <!-- Right strand -->
    <path d="M332,80 C332,140 180,160 180,220 C180,290 332,320 332,380 C332,440 180,460 180,512"/>
  </g>

  <!-- Rungs -->
  <g stroke="#e94560" stroke-width="3" opacity="0.7">
    <line x1="180" y1="120" x2="332" y2="120"/>
    <line x1="197" y1="160" x2="315" y2="160" opacity="0.6"/>
    <line x1="256" y1="220" x2="256" y2="220"/>
    <line x1="315" y1="280" x2="197" y2="280" opacity="0.6"/>
    <line x1="332" y1="320" x2="180" y2="320"/>
    <line x1="315" y1="360" x2="197" y2="360" opacity="0.6"/>
    <line x1="256" y1="400" x2="256" y2="400"/>
  </g>

  <!-- Nodes -->
  <g fill="#e94560">
    <circle cx="180" cy="80" r="8"/>
    <circle cx="332" cy="220" r="8"/>
    <circle cx="180" cy="380" r="8"/>
  </g>
  <g fill="#0ea5e9">
    <circle cx="332" cy="80" r="8"/>
    <circle cx="180" cy="220" r="8"/>
    <circle cx="332" cy="380" r="8"/>
  </g>
</svg>
